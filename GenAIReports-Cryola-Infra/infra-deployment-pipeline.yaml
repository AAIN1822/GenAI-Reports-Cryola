trigger: none

# ==========================================================
# Runtime Parameter (Environment Selector)
# ==========================================================
parameters:
- name: environment
  displayName: Select Environment
  type: string
  default: "qa"
  values:
  - dev
  - qa
  - prod

# ==========================================================
# Variables
# ==========================================================
variables:
- group: terraform-sp-credentials

- name: backendResourceGroup
  value: 'sf-terraform-storage'

- name: backendStorageAccount
  value: 'sfterraformsaeus'

- name: backendContainer
  value: 'con-terraform'

# Dynamic backend state file per environment
- name: backendKey
  value: 'bootstrap-${{ parameters.environment }}.tfstate'

- name: selfHostedAgentPool
  value: 'crayola-agent'

# Dynamic tfvars path
- name: tfvarsFile
  value: 'environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars'

# ==========================================================
# STAGE 1: Bootstrap Infrastructure (Microsoft-hosted agent)
# ==========================================================
stages:
- stage: Bootstrap
  displayName: 'Stage 1: Bootstrap Infrastructure'
  pool:
    vmImage: 'windows-latest'

  jobs:
  - job: DeployBootstrap
    displayName: 'Deploy VNet, NSG, and VM with Agent'

    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Terraform Apply Bootstrap Module Only'
      inputs:
        azureSubscription: 'sc-fsdu-ado-dev'
        scriptType: ps
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          $ErrorActionPreference = "Stop"

          $env:ARM_CLIENT_ID = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
          $env:ARM_TENANT_ID = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv)

          Set-Location "$(System.DefaultWorkingDirectory)/infra"

          Write-Host "[INFO] Fetching latest Terraform version..."
          $latest = (Invoke-RestMethod https://checkpoint-api.hashicorp.com/v1/check/terraform).current_version
          $url = "https://releases.hashicorp.com/terraform/$latest/terraform_${latest}_windows_amd64.zip"

          Invoke-WebRequest -Uri $url -OutFile "$PWD\terraform.zip"
          Expand-Archive terraform.zip -DestinationPath terraform -Force
          $tf = "$PWD\terraform\terraform.exe"

          & $tf -version

          Write-Host "[INFO] Running terraform init..."
          & $tf init `
            -upgrade `
            -backend-config="resource_group_name=$(backendResourceGroup)" `
            -backend-config="storage_account_name=$(backendStorageAccount)" `
            -backend-config="container_name=$(backendContainer)" `
            -backend-config="key=$(backendKey)"

          Write-Host "[INFO] Running terraform plan (bootstrap only)..."
          & $tf plan `
            "-target=module.bootstrap" `
            "-var-file=$(tfvarsFile)" `
            "-out=tfplan-bootstrap"

          Write-Host "[INFO] Running terraform apply..."
          & $tf apply -auto-approve tfplan-bootstrap

          Write-Host "[INFO] Bootstrap complete."

# ==========================================================
# STAGE 2: Deploy Resources (Self-Hosted Agent)
# ==========================================================
- stage: DeployResources
  displayName: 'Stage 2: Deploy Resources (Self-Hosted Agent)'
  dependsOn: Bootstrap
  pool:
    name: $(selfHostedAgentPool)

  jobs:
  - job: DeployInfrastructure
    displayName: 'Deploy KeyVault, CosmosDB, OpenAI, Container App'
    timeoutInMinutes: 60

    steps:
    - checkout: self

    # -------------------------------------
    # Install Azure CLI if missing
    # -------------------------------------
    - task: PowerShell@2
      displayName: 'Install Azure CLI on Self-Hosted Agent'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "[INFO] Checking Azure CLI..."
          try {
              az --version
              Write-Host "[INFO] Azure CLI already installed."
          } catch {
              Write-Host "[INFO] Installing Azure CLI..."
              $AzInstallerUrl = "https://aka.ms/installazurecliwindows"
              $InstallerPath = "$env:TEMP\AzureCLI.msi"
              Invoke-WebRequest -Uri $AzInstallerUrl -OutFile $InstallerPath
              Start-Process msiexec.exe -Wait -ArgumentList "/I `"$InstallerPath`" /quiet /qn /norestart"
          }

    # -------------------------------------
    # Show Agent Info
    # -------------------------------------
    - task: PowerShell@2
      displayName: 'Show Agent Info'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Agent Name: $env:AGENT_NAME"
          Write-Host "Agent Machine: $env:AGENT_MACHINENAME"
          Write-Host "Agent Pool: $env:AGENT_POOL"
          Write-Host "Agent OS: $env:AGENT_OS"

    # -------------------------------------
    # Terraform Init, Plan & Apply
    # -------------------------------------
    - task: PowerShell@2
      displayName: 'Terraform Init, Plan & Apply (Main Infrastructure)'
      inputs:
        targetType: 'inline'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
        script: |
          $ErrorActionPreference = "Stop"

          # Login to Azure
          az login --service-principal `
            -u $env:ARM_CLIENT_ID `
            -p $env:ARM_CLIENT_SECRET `
            --tenant $env:ARM_TENANT_ID

          az account set --subscription $env:ARM_SUBSCRIPTION_ID

          # Download Terraform
          $latest = (Invoke-RestMethod https://checkpoint-api.hashicorp.com/v1/check/terraform).current_version
          $url = "https://releases.hashicorp.com/terraform/$latest/terraform_${latest}_windows_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$PWD\terraform.zip"
          Expand-Archive terraform.zip -DestinationPath terraform -Force
          $tf = "$PWD\terraform\terraform.exe"

          # Terraform Init
          & $tf init `
            -upgrade `
            -backend-config="resource_group_name=$(backendResourceGroup)" `
            -backend-config="storage_account_name=$(backendStorageAccount)" `
            -backend-config="container_name=$(backendContainer)" `
            -backend-config="key=$(backendKey)"

          # Terraform Plan
          & $tf plan `
            "-var-file=$(tfvarsFile)" `
            "-out=tfplan"
          # Terraform Apply
          & $tf apply -auto-approve tfplan

      env:
        ARM_CLIENT_ID: $(armClientId)
        ARM_CLIENT_SECRET: $(armClientSecret)
        ARM_TENANT_ID: $(armTenantId)
        ARM_SUBSCRIPTION_ID: $(armSubscriptionId)
