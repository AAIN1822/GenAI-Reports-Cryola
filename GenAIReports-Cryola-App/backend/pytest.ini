# pytest.ini
[pytest]
# Define where to look for tests
testpaths = tests

# Test file and function naming conventions
python_files = test_*.py
python_functions = test_*

# Asyncio support (for async FastAPI endpoints)
asyncio_mode = auto

# Filter out noisy deprecation and user warnings
filterwarnings =
    ignore::DeprecationWarning:starlette.routing
    ignore:generator function lifespans are deprecated:DeprecationWarning

# Optional: coverage reports (uncomment if you want)
# addopts = -ra -q --cov=app --cov-report=term-missing

# Compact pytest output
addopts = -ra -q