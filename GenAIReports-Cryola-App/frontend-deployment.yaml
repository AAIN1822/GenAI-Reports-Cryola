trigger:
  branches:
    include:
      - backend-test

pool:
  vmImage: ubuntu-latest

variables:
- group: fsdu-frontend-dev

stages:

# ==========================================================
# BUILD STAGE
# ==========================================================
- stage: BuildFrontend
  displayName: "Build Frontend"
  jobs:
    - job: BuildFrontendJob
      displayName: "Build Frontend App"
      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSource: 'spec'
            versionSpec: '22.x'
            checkLatest: true

        - script: |
            cd frontend
            npm install
          displayName: "Install NPM Dependencies"

        - script: |
            cd frontend
            npm run build
          displayName: "Build Frontend App"

        - task: PublishBuildArtifacts@1
          inputs:
            PathtoPublish: 'frontend/dist'
            ArtifactName: 'frontend_dist'
            publishLocation: 'Container'


# ==========================================================
# DEV DEPLOYMENT STAGE
# ==========================================================
- stage: DeployDev
  displayName: "Deploy to Azure Static Web App (DEV)"
  dependsOn: BuildFrontend
  condition: succeeded()
  variables:
    - group: fsdu-frontend-dev
  jobs:
    - job: DeployDevJob
      displayName: "Deploy to DEV"
      steps:

        - task: DownloadBuildArtifacts@0
          inputs:
            artifactName: 'frontend_dist'
            downloadPath: '$(Pipeline.Workspace)/drop'

        - script: |
            mkdir -p $(Build.SourcesDirectory)/frontend_dist
            cp -r $(Pipeline.Workspace)/drop/frontend_dist/* $(Build.SourcesDirectory)/frontend_dist/
          displayName: "Copy Dev Artifact"

        - task: AzureStaticWebApp@0
          displayName: "Deploy to Azure Static Web App (DEV)"
          inputs:
            azure_static_web_apps_api_token: $(SWA_DEV_DEPLOYMENT_TOKEN)
            app_location: 'frontend_dist'
            output_location: '.'
            skip_app_build: true


